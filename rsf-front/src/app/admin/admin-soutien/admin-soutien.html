<section class="admin-page-toolbar">
  <div>
    <p class="admin-eyebrow">Edition de page</p>
    <h2>Soutien aux membres</h2>
    <span>Modifie l'en-tete, les services et le bloc d'aide.</span>
  </div>
  <button type="button" class="btn btn-primary admin-save-btn" (click)="save()" [disabled]="saving">
    <i class="fas fa-floppy-disk"></i>
    <span>{{ saving ? 'Enregistrement...' : 'Enregistrer' }}</span>
  </button>
</section>

<div class="panel">
  <div class="panel-header">
    <div>
      <div class="panel-title"><i class="pi fas fa-image"></i>En-tête & introduction</div>
    </div>
  </div>
  <div class="panel-body">
<div class="form-grid" style="display:grid;gap:14px;">
<div class="form-group">
  <label for="s_title">Titre de la page</label>
  <input class="input" type="text" id="s_title" name="s_title" [(ngModel)]="data.s_title" placeholder=""/>
</div>
<div class="form-group">
  <label for="s_desc">Description</label>
  <textarea class="textarea" id="s_desc" name="s_desc" [(ngModel)]="data.s_desc" style="min-height:64px"></textarea>
</div>
</div></div>
</div>
