<section class="login-shell">
  <div class="login-card">
    <div class="login-badge">RSF Admin</div>
    <h1>Connexion administrateur</h1>
    <p>Structure de connexion prete. Tu pourras brancher ici ton authentification backend ensuite.</p>

    <form class="login-form">
      <label>
        Adresse e-mail
        <input type="email" [(ngModel)]="email" name="email" placeholder="admin@rsf.fr" />
      </label>
      <label>
        Mot de passe
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </label>

      <a routerLink="/admin/dashboard" class="login-btn">
        Entrer dans le back-office
      </a>
    </form>
  </div>
</section>
