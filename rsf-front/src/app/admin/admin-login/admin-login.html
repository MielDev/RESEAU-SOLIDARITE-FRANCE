<section class="login-shell">
  <div class="login-card">
    <div class="login-badge">RSF Admin</div>
    <h1>Connexion administrateur</h1>
    <p>Le back-office est maintenant relie au backend. Utilise ici les identifiants admin stockes en base.</p>

    <div class="login-error" *ngIf="errorMessage">
      <i class="fas fa-circle-exclamation"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <label>
        Adresse e-mail
        <input type="email" [(ngModel)]="email" name="email" placeholder="admin@rsf.fr" autocomplete="username" />
      </label>
      <label>
        Mot de passe
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" autocomplete="current-password" />
      </label>

      <button class="login-btn" type="submit" [disabled]="isSubmitting">
        <i class="fas fa-right-to-bracket"></i>
        {{ isSubmitting ? 'Connexion...' : 'Entrer dans le back-office' }}
      </button>
    </form>
  </div>
</section>
