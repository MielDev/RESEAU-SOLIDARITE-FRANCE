<div class="form-group">

  <textarea class="textarea" id="ph_desc" name="ph_desc" style="min-height:112px">RÉSEAU SOLIDARITÉ FRANCE est né de la volonté de citoyens engagés, ayant connu eux-mêmes les difficultés liées à l'intégration en France.</textarea>

<div class="panel">
  <div class="panel-header">
    <div>
      <div class="panel-title"><span class="pi">📖</span>Section — Notre histoire</div>
      <div class="panel-desc">Texte principal présentant l'histoire de l'association</div>
    </div>
    
  </div>
  <div class="panel-body">
<div class="form-grid" style="display:grid;gap:14px;">
  
<div class="form-group">
  <label for="hist_title">Titre de section</label>
  <input class="input" type="text" id="hist_title" name="hist_title" value="Une association née de l'engagement" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="hist_p1">Paragraphe 1</label>
  <textarea class="textarea" id="hist_p1" name="hist_p1" style="min-height:88px">Créée à Rennes, l'association répond à un besoin simple mais crucial : ne laisser personne seul face à la précarité, à l'isolement ou aux démarches complexes.</textarea>
  
</div>
  
<div class="form-group">
  <label for="hist_p2">Paragraphe 2</label>
  <textarea class="textarea" id="hist_p2" name="hist_p2" style="min-height:112px">Notre engagement est concret, humain et solidaire. Depuis notre création, nous accompagnons des étudiants, des salariés et des personnes en situation de précarité, dont des sans-abri, pour les aider à mieux vivre en France.</textarea>
  
</div>
  
<div class="form-group">
  <label for="hist_p3">Paragraphe 3</label>
  <textarea class="textarea" id="hist_p3" name="hist_p3" style="min-height:88px">Nous œuvrons chaque jour dans un esprit de solidarité, d'entraide et de responsabilité, en promouvant le respect des lois et des valeurs de la République.</textarea>
  
</div>
</div></div>
</div>
