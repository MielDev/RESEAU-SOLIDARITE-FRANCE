<div class="panel">
  <div class="panel-header">
    <div>
      <div class="panel-title"><span class="pi">📋</span>Informations générales de l'événement</div>
      
    </div>
    
  </div>
  <div class="panel-body">
<div class="form-grid form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  
<div class="form-group">
  <label for="ra_title">Titre de l'événement</label>
  <input class="input" type="text" id="ra_title" name="ra_title" value="Rencontre Annuelle 2025" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_edition">Numéro d'édition</label>
  <input class="input" type="text" id="ra_edition" name="ra_edition" value="2ᵉ Édition" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_date">Date</label>
  <input class="input" type="date" id="ra_date" name="ra_date" value="2025-07-26" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_start">Heure de début</label>
  <input class="input" type="time" id="ra_start" name="ra_start" value="10:00" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_end">Heure de fin</label>
  <input class="input" type="time" id="ra_end" name="ra_end" value="22:00" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_place">Lieu</label>
  <input class="input" type="text" id="ra_place" name="ra_place" value="Parc des Gayeulles, Rennes" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_email">Email de contact</label>
  <input class="input" type="email" id="ra_email" name="ra_email" value="contact@reseau-solidarite-france.fr" placeholder=""/>
  
</div>
  
<div class="form-group">
  <label for="ra_web">Site web</label>
  <input class="input" type="url" id="ra_web" name="ra_web" value="www.reseau-solidarite-france.fr" placeholder=""/>
  
</div>
</div>
<div class="form-grid" style="display:grid;gap:14px;margin-top:14px;">
  
<div class="form-group">
  <label for="ra_desc">Description principale</label>
  <textarea class="textarea" id="ra_desc" name="ra_desc" style="min-height:88px">Nous avons le plaisir de vous partager le programme officiel de notre événement annuel. Une journée placée sous le signe de la solidarité, de la convivialité et du partage.</textarea>
  
</div>
</div></div>
</div>
