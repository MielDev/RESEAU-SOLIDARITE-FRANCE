<section class="admin-page-toolbar">
  <div>
    <p class="admin-eyebrow">Edition de page</p>
    <h2>Missions</h2>
    <span>Configure les domaines d'action et les points affiches dans chaque carte.</span>
  </div>
  <button type="button" class="btn btn-primary admin-save-btn" (click)="save()" [disabled]="saving">
    <i class="fas fa-floppy-disk"></i>
    <span>{{ saving ? 'Enregistrement...' : 'Enregistrer' }}</span>
  </button>
</section>

<app-admin-page-details-editor configKey="missions"></app-admin-page-details-editor>

<div class="missions-editor">
  <main class="missions-main">
    <section class="mission-card panel" *ngFor="let slot of missionSlots" [id]="'mission-' + slot.index">
      <div class="panel-header">
        <div>
          <div class="panel-title">
            <i class="pi" [class]="missionPreview(slot.index).icon"></i>
            Mission {{ slot.index }}
          </div>
          <div class="panel-desc">{{ missionPreview(slot.index).title }}</div>
        </div>
      </div>

      <div class="panel-body">
        <div class="mission-top-grid">
          <div class="form-group">
            <label [for]="'m' + slot.index + '_icon'">Icone</label>
            <app-admin-icon-picker [(ngModel)]="data['m' + slot.index + '_icon']" [fallbackIcon]="slot.fallbackIcon"></app-admin-icon-picker>
          </div>

          <div class="form-group">
            <label [for]="'m' + slot.index + '_title'">Titre</label>
            <input class="input" type="text" [id]="'m' + slot.index + '_title'" [name]="'m' + slot.index + '_title'" [(ngModel)]="data['m' + slot.index + '_title']" />
          </div>

          <div class="form-group">
            <label [for]="'m' + slot.index + '_color'">Couleur</label>
            <select class="select" [id]="'m' + slot.index + '_color'" [name]="'m' + slot.index + '_color'" [(ngModel)]="data['m' + slot.index + '_color']">
              <option>Bleu</option>
              <option>Violet</option>
              <option>Orange</option>
              <option>Vert</option>
              <option>Gris</option>
            </select>
          </div>
        </div>

        <div class="points-section">
          <div class="section-heading">
            <h4>Points de la liste</h4>
            <span>Maximum 5 points</span>
          </div>

          <div class="points-list">
            <div class="point-row" *ngFor="let pointIndex of pointSlots">
              <span class="point-index">{{ pointIndex }}</span>
              <input
                class="input"
                type="text"
                [name]="'m' + slot.index + '_p' + pointIndex"
                [(ngModel)]="data['m' + slot.index + '_p' + pointIndex]"
              />
              <button class="btn btn-ghost btn-sm btn-icon" type="button" title="Vider ce point" (click)="clearPoint(slot.index, pointIndex)">
                <i class="fas fa-xmark"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
